<po-page-list
  p-title="Clientes"
  [p-actions]="pageActions"
  (p-quick-search)="onQuickSearch($event)"
  p-quick-search-placeholder="Buscar por nome ou código..."
>
  <po-table
    [p-columns]="columns"
    [p-items]="items()"
    [p-actions]="tableActions"
    [p-loading]="loading()"
    [p-show-more-button]="hasNext()"
    (p-show-more)="onShowMore()"
    p-literals='{"noData": "Nenhum cliente encontrado."}'
    p-sort
    p-striped
  >
  </po-table>
</po-page-list>
