<po-page-default [p-title]="title" [p-actions]="pageActions">

  <po-divider p-label="Registros de Taxa por Administradora / Bandeira"></po-divider>
  <po-table
    [p-columns]="colsMaster"
    [p-items]="masterItems"
    [p-selectable]="true"
    [p-selectable-entire-line]="true"
    [p-striped]="true"
    (p-selected)="onRowSelect($event)"
    (p-unselected)="onRowUnselect()">
  </po-table>

  @if (selectedRow()) {
    <po-divider [p-label]="detailTitle"></po-divider>
    <div class="detail-panel">
      <div class="detail-left">
        <po-dynamic-view [p-fields]="detailFields" [p-value]="selectedRow()!"></po-dynamic-view>
        <po-divider p-label="Antecipações — Ortobom"></po-divider>
        <po-table
          [p-columns]="colsAntec"
          [p-items]="antecipacoes"
          [p-striped]="true"
          [p-height]="200">
        </po-table>
      </div>
      <div class="detail-right">
        <po-table
          [p-columns]="colsModal"
          [p-items]="modais"
          [p-actions]="tableActions"
          [p-striped]="true">
        </po-table>
      </div>
    </div>
  }

</po-page-default>
