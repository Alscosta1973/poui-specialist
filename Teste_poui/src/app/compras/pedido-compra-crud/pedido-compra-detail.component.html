<po-page-default
  [p-title]="pageTitle()"
  [p-actions]="pageActions">

  @if (loading()) {
    <div class="detalhe-loading">
      <po-loading p-text="Carregando pedido..."></po-loading>
    </div>
  }

  @if (!loading() && record(); as r) {

    <po-divider p-label="Dados do Pedido"></po-divider>

    <div class="po-row">

      <po-info
        class="po-md-2"
        p-label="Nº Pedido"
        [p-value]="r.numero">
      </po-info>

      <po-info
        class="po-md-2"
        p-label="Emissão"
        [p-value]="(r.emissao | date:'dd/MM/yyyy':'UTC') ?? ''">
      </po-info>

      <po-info
        class="po-md-4"
        p-label="Fornecedor"
        [p-value]="r.fornecedor">
      </po-info>

      <po-info
        class="po-md-1"
        p-label="Loja"
        [p-value]="r.loja">
      </po-info>

      <po-info
        class="po-md-2"
        p-label="Cond. Pagamento"
        [p-value]="r.condPagto || '—'">
      </po-info>

    </div>

    @if (r.observacao) {
      <div class="po-row">
        <po-info
          class="po-md-12"
          p-label="Observação"
          [p-value]="r.observacao">
        </po-info>
      </div>
    }

    <po-divider p-label="Itens do Pedido"></po-divider>

    <po-table
      [p-columns]="columnsItens"
      [p-items]="r.itens ?? []"
      [p-hide-select-all]="true">
    </po-table>

    <div class="detalhe-total-geral">
      <span>Total Geral do Pedido:</span>
      <strong>{{ totalGeral() | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</strong>
    </div>

  }

</po-page-default>
