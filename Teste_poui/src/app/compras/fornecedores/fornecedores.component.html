<po-page-dynamic-search
  p-title="Fornecedores"
  [p-actions]="pageActions"
  [p-filters]="filters"
  (p-quick-search)="onSearch($event)"
  (p-advanced-search)="onAdvancedSearch($event)">
  <po-table
    [p-columns]="cols"
    [p-items]="items()"
    [p-loading]="loading()"
    [p-height]="400"
    [p-show-more-disabled]="!hasNext()"
    (p-show-more)="onShowMore()">
  </po-table>
</po-page-dynamic-search>
