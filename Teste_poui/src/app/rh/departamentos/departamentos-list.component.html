<po-page-dynamic-search
  p-title="Departamentos"
  [p-actions]="pageActions"
  [p-filters]="advancedFilters"
  (p-quick-search)="onQuickSearch($event)"
  (p-advanced-search)="onAdvancedSearch($event)"
  (p-change-disclaimers)="onChangeDisclaimers($event)">

  <po-table
    [p-columns]="columns"
    [p-items]="items()"
    [p-loading]="loading()"
    [p-actions]="tableActions"
    [p-show-more-disabled]="!hasNext()"
    (p-show-more)="onShowMore()">
  </po-table>

</po-page-dynamic-search>

<!-- Modal de inclusão / edição -->
<po-modal
  p-title="Manutenção de Departamento"
  p-size="md"
  [p-primary-action]="confirmarModal"
  [p-secondary-action]="cancelarModal">

  <!--
    [p-fields]="formFields()" — chamada explícita do signal (Quirk #14)
    [(p-value)]="formValues"  — two-way binding para propriedade simples;
                                leitura definitiva em save() via dynamicForm.value
  -->
  <po-dynamic-form
    [p-fields]="formFields()"
    [(p-value)]="formValues">
  </po-dynamic-form>

</po-modal>
