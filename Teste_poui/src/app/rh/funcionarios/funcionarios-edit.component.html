<po-page-edit
  [p-title]="isEdit() ? 'Editar Funcionário' : 'Novo Funcionário'"
  [p-breadcrumb]="breadcrumb"
  [p-actions]="pageActions">

  <form [formGroup]="form">

    <!-- ===== Seção 1 — Dados Pessoais ===== -->
    <po-divider p-label="Dados Pessoais"></po-divider>

    <div class="po-row">
      <po-input
        class="po-md-3"
        formControlName="matricula"
        p-label="Matrícula"
        p-required="true"
        [p-maxlength]="6"
        [p-disabled]="isEdit()">
      </po-input>

      <po-input
        class="po-md-9"
        formControlName="nome"
        p-label="Nome"
        p-required="true"
        [p-maxlength]="40">
      </po-input>
    </div>

    <div class="po-row">
      <po-input
        class="po-md-4"
        formControlName="cpf"
        p-label="CPF"
        p-mask="999.999.999-99"
        [p-maxlength]="14">
      </po-input>

      <po-datepicker
        class="po-md-4"
        formControlName="dataNascimento"
        p-label="Data Nascimento"
        p-format="dd/MM/yyyy">
      </po-datepicker>

      <po-select
        class="po-md-4"
        formControlName="escolaridade"
        p-label="Escolaridade"
        [p-options]="escolaridadeOptions">
      </po-select>
    </div>

    <div class="po-row">
      <po-select
        class="po-md-4"
        formControlName="deficiencia"
        p-label="Deficiência"
        [p-options]="deficienciaOptions">
      </po-select>
    </div>

    <!-- ===== Seção 2 — Dados Profissionais ===== -->
    <po-divider p-label="Dados Profissionais"></po-divider>

    <div class="po-row">
      <po-input
        class="po-md-6"
        formControlName="cargo"
        p-label="Cargo"
        [p-maxlength]="30">
      </po-input>

      <po-input
        class="po-md-3"
        formControlName="departamento"
        p-label="Departamento"
        [p-maxlength]="9">
      </po-input>

      <po-input
        class="po-md-3"
        formControlName="centroCusto"
        p-label="Centro de Custo"
        [p-maxlength]="9">
      </po-input>
    </div>

    <div class="po-row">
      <po-datepicker
        class="po-md-3"
        formControlName="dataAdmissao"
        p-label="Data Admissão"
        p-required="true"
        p-format="dd/MM/yyyy">
      </po-datepicker>

      <po-select
        class="po-md-3"
        formControlName="situacao"
        p-label="Situação"
        [p-options]="situacaoOptions">
      </po-select>

      <po-select
        class="po-md-3"
        formControlName="tipoContrato"
        p-label="Tipo Contrato"
        [p-options]="tipoContratoOptions">
      </po-select>

      <po-select
        class="po-md-3"
        formControlName="turno"
        p-label="Turno"
        [p-options]="turnoOptions">
      </po-select>
    </div>

    <div class="po-row">
      <po-decimal
        class="po-md-4"
        formControlName="salario"
        p-label="Salário"
        [p-decimals-length]="2"
        [p-thousand-maxlength]="12">
      </po-decimal>
    </div>

    <!-- ===== Seção 3 — Endereço ===== -->
    <po-divider p-label="Endereço"></po-divider>

    <div class="po-row">
      <po-input
        class="po-md-9"
        formControlName="endereco"
        p-label="Endereço"
        [p-maxlength]="40">
      </po-input>

      <po-input
        class="po-md-3"
        formControlName="cep"
        p-label="CEP"
        p-mask="99999-999"
        [p-maxlength]="9">
      </po-input>
    </div>

    <div class="po-row">
      <po-input
        class="po-md-4"
        formControlName="bairro"
        p-label="Bairro"
        [p-maxlength]="12">
      </po-input>

      <po-input
        class="po-md-4"
        formControlName="municipio"
        p-label="Município"
        [p-maxlength]="15">
      </po-input>

      <po-select
        class="po-md-4"
        formControlName="estado"
        p-label="Estado (UF)"
        [p-options]="estadoOptions">
      </po-select>
    </div>

    <!-- ===== Seção 4 — Dados Bancários ===== -->
    <po-divider p-label="Dados Bancários"></po-divider>

    <div class="po-row">
      <po-input
        class="po-md-2"
        formControlName="banco"
        p-label="Banco"
        [p-maxlength]="3">
      </po-input>

      <po-input
        class="po-md-3"
        formControlName="agencia"
        p-label="Agência"
        [p-maxlength]="5">
      </po-input>

      <po-input
        class="po-md-4"
        formControlName="conta"
        p-label="Conta"
        [p-maxlength]="13">
      </po-input>
    </div>

  </form>

</po-page-edit>
